<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mila — live</title>
<style>
  html,body{margin:0;height:100%;background:linear-gradient(180deg,#faf8f5 0%,#f3f6f7 55%,#dde8e3 100%);font-family:system-ui,sans-serif;overflow:hidden}
  #avatar{width:100vw;height:100vh}
  #title{position:fixed;top:16px;left:20px;z-index:10;color:#26343b}
  #title b{font-size:20px;letter-spacing:.06em}
  #title span{display:block;font-size:11px;letter-spacing:.18em;color:#5e6a6a;text-transform:uppercase;margin-top:2px}
  #sub{position:fixed;bottom:104px;left:50%;transform:translateX(-50%);z-index:10;max-width:80%;text-align:center;color:#26343b;font-size:17px;line-height:1.45;background:rgba(255,255,255,.55);padding:8px 16px;border-radius:14px;backdrop-filter:blur(6px);opacity:0;transition:opacity .3s}
  #sub.on{opacity:1}
  #say{position:fixed;bottom:34px;left:50%;transform:translateX(-50%);z-index:10;border:none;cursor:pointer;
       background:linear-gradient(180deg,#d9006c,#a40050);color:#fff;font-size:15px;letter-spacing:.04em;
       padding:14px 30px;border-radius:999px;box-shadow:0 10px 30px -10px rgba(164,0,80,.6)}
  #say:disabled{opacity:.5;cursor:default}
  #err{position:fixed;bottom:8px;left:8px;z-index:10;font:12px monospace;color:#a40050;white-space:pre-wrap}
</style>
<script type="importmap">{"imports":{
"three":"https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js/+esm",
"three/addons/":"https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
"talkinghead":"https://cdn.jsdelivr.net/gh/met4citizen/TalkingHead@1.7/modules/talkinghead.mjs"
}}</script></head>
<body>
<div id="title"><b>Mila</b><span>live · preview</span></div>
<div id="avatar"></div>
<div id="sub"></div>
<button id="say" disabled>…</button>
<div id="err"></div>
<script type="module">
import { TalkingHead } from "talkinghead";
const err=(m)=>{document.getElementById('err').textContent=m;};
const sub=document.getElementById('sub'), btn=document.getElementById('say');
const LINES=[
  "Hi, I'm Mila. Let's practice your English together.",
  "Don't worry about mistakes — that's how we learn. Say anything.",
  "Your pronunciation is getting better already. I can hear it.",
  "Tell me about your day. I'm listening, and I'll help you sound natural.",
  "Ready when you are. Take a breath, and let's begin."
];
// Pick a warm female English voice from the browser, if one exists.
function femaleVoice(){
  const vs = speechSynthesis.getVoices();
  return vs.find(v=>/female|samantha|zira|aria|jenny|libby|sonia/i.test(v.name) && /en/i.test(v.lang))
      || vs.find(v=>/en-US|en-GB/i.test(v.lang)) || vs[0];
}
function say(head, text){
  sub.textContent=text; sub.classList.add('on');
  try{ head.speakText(text); }catch(e){}          // visual visemes (mute)
  try{                                             // voice via the browser
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    const v=femaleVoice(); if(v)u.voice=v; u.rate=.98; u.pitch=1.05;
    u.onend=()=>{ setTimeout(()=>sub.classList.remove('on'),600); };
    speechSynthesis.speak(u);
  }catch(e){}
}
try{
  const head = new TalkingHead(document.getElementById('avatar'), {
    avatarMute:true, lipsyncModules:["en"], cameraView:"full",
    cameraRotateEnable:true, lightAmbientIntensity:2.2, lightDirectIntensity:22
  });
  await head.showAvatar({ url:"avatar/brunette.glb", body:"F", lipsyncLang:"en", avatarMood:"happy" });
  let i=0;
  btn.disabled=false; btn.textContent="Say hi";
  const go=()=>{ say(head, LINES[i%LINES.length]); i++; };
  btn.addEventListener('click', go);
  // ensure voices are loaded, then auto-greet once
  const greet=()=>{ setTimeout(go, 400); };
  if(speechSynthesis.getVoices().length) greet(); else speechSynthesis.onvoiceschanged=greet;
}catch(e){ err("avatar error: "+(e&&e.message||e)); }
</script></body></html>
