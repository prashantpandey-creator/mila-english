name: Diagnose Mumbai box
# Read-only vitals for the Mumbai VPS, runnable when nobody has interactive
# SSH at hand. Uses the same deploy key/secret as deploy.yml and touches
# nothing: no restarts, no writes, no model loads.
on:
  workflow_dispatch:
jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Read-only box vitals via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 209.182.233.163
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 10m
          script: |
            echo "=== host ==="
            hostname; uptime; nproc
            echo "=== memory (MB) ==="
            free -m
            echo "=== swap ==="
            swapon --show || echo "no swap configured"
            echo "=== disk ==="
            df -h
            echo "=== docker disk ==="
            docker system df
            echo "=== containers ==="
            docker ps -a --format 'table {{.Names}}\t{{.Status}}'
            echo "=== per-container memory/cpu ==="
            docker stats --no-stream
            echo "=== ollama ps: mila-llm (chat) ==="
            docker exec -e OLLAMA_HOST=127.0.0.1:11434 mila-llm ollama ps || true
            echo "=== ollama ps: mila-voice-llm ==="
            docker exec -e OLLAMA_HOST=127.0.0.1:11434 mila-voice-llm ollama ps || true
            echo "=== ollama models on disk ==="
            docker exec -e OLLAMA_HOST=127.0.0.1:11434 mila-llm ollama list || true
            docker exec -e OLLAMA_HOST=127.0.0.1:11434 mila-voice-llm ollama list || true
            echo "=== compose drift: live container config vs repo ==="
            docker inspect -f 'mila-llm       created={{.Created}} mem={{.HostConfig.Memory}} memswap={{.HostConfig.MemorySwap}} cpus={{.HostConfig.NanoCpus}} confighash={{index .Config.Labels "com.docker.compose.config-hash"}}' mila-llm || true
            docker inspect -f 'mila-voice-llm created={{.Created}} mem={{.HostConfig.Memory}} memswap={{.HostConfig.MemorySwap}} cpus={{.HostConfig.NanoCpus}} confighash={{index .Config.Labels "com.docker.compose.config-hash"}}' mila-voice-llm || true
            ls -la /root/mila/docker-compose.override.yml 2>/dev/null && cat /root/mila/docker-compose.override.yml || echo "no docker-compose.override.yml"
            ls /root/mila/*.yml /root/mila/*.yaml 2>/dev/null
            cd /root/mila && git log --oneline -1 && git status --short | head -5
            echo "=== non-secret model config lines from .env ==="
            grep -E '^(LOCAL_LLM_MODEL|LOCAL_VOICE_LLM_MODEL|OLLAMA_|LOCAL_LLM_REASONING|ALLOW_EXTERNAL_CHAT_FALLBACK)' /root/mila/.env || echo "(none set — defaults in use)"
            echo "=== kernel OOM kills (last 24h) ==="
            dmesg -T 2>/dev/null | grep -iE 'out of memory|oom-kill|killed process' | tail -25 || true
            journalctl -k --since '24 hours ago' 2>/dev/null | grep -i 'oom' | tail -25 || true
            echo "=== mila-llm recent logs ==="
            docker logs --tail 60 mila-llm 2>&1 | tail -60
            echo "=== mila-voice-llm recent logs ==="
            docker logs --tail 60 mila-voice-llm 2>&1 | tail -60
            echo "=== mila APP container logs (errors only) ==="
            docker logs --tail 400 mila 2>&1 | grep -iE 'error|fail|exception|unhandled|throw|quota|429|401|402|rate|provider|prisma|column|no such|ECONN|ENOTFOUND|timeout|abort|refus|invalid|undefined' | tail -70
            echo "=== mila APP logs (raw tail) ==="
            docker logs --tail 40 mila 2>&1 | tail -40
            echo "=== does mila reach its model provider? (env presence, no secrets) ==="
            docker exec mila sh -lc 'echo OPENAI=${OPENAI_API_KEY:+set} OPENROUTER=${OPENROUTER_API_KEY:+set} OPENAI_CHAT_MODEL=$OPENAI_CHAT_MODEL OPENROUTER_CHAT_MODEL=$OPENROUTER_CHAT_MODEL LOCAL_LLM_URL=$LOCAL_LLM_URL' 2>&1 || true
            echo "=== done (read-only) ==="
