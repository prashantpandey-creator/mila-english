name: Deploy Mila to Mumbai
on:
  push:
    branches: [main]
  workflow_dispatch:
concurrency:
  group: mila-production
  cancel-in-progress: false
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 209.182.233.163
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -e
            cd /root/mila 2>/dev/null || git clone https://github.com/prashantpandey-creator/mila-english.git /root/mila
            cd /root/mila && git fetch --all && git reset --hard origin/main
            # Provider keys are optional and remain in the server-side .env.
            # Do not forward them through the SSH action: exported values appear
            # in the remote shell command line to privileged process inspection.
            touch .env && chmod 600 .env
            # The chat brain is CLOUD-FIRST as of 2026-07-17 (owner directive:
            # the resident 20B starved PuranGPT on this shared box — see the
            # 07-18 co-tenancy outage). The env flag must reflect that even if
            # an old .env still says false.
            if grep -q '^ALLOW_EXTERNAL_CHAT_FALLBACK=' .env; then
              sed -i 's/^ALLOW_EXTERNAL_CHAT_FALLBACK=.*/ALLOW_EXTERNAL_CHAT_FALLBACK=true/' .env
            else
              echo 'ALLOW_EXTERNAL_CHAT_FALLBACK=true' >> .env
            fi
            # Evaluation runtimes are never part of production. Remove any
            # interrupted benchmark before builds can compete with the app.
            docker rm -f mila-model-eval mila-llm-bench >/dev/null 2>&1 || true
            # 2026-07-19: resident brains RESTORED (see docker-compose.prod.yml).
            # Do NOT delete mila-llm/mila-voice-llm or their volumes here — that
            # would wipe the pulled models every deploy. They are bounded in
            # compose so they can't starve PuranGPT again.
            test -f pron-service/model.onnx || { echo "model.onnx missing — see pron-service/README.md"; exit 1; }
            # Take a transactionally consistent SQLite snapshot before the new
            # image can run `prisma db push`. VACUUM INTO reads the live database
            # without modifying it; any backup or integrity-check failure aborts
            # the deploy while the current container is still serving.
            if [ "$(docker inspect -f '{{.State.Running}}' mila 2>/dev/null || true)" = "true" ]; then
              docker exec mila test -s /data/mila.db || { echo "Running Mila has no non-empty /data/mila.db; refusing to deploy"; exit 1; }
              backup_stamp="$(date -u +%Y%m%dT%H%M%SZ)"
              backup_path="/data/backups/mila-${backup_stamp}.db"
              docker exec mila mkdir -p /data/backups
              docker exec -e MILA_BACKUP_PATH="$backup_path" mila node -e '
                const { PrismaClient } = require("@prisma/client");
                const db = new PrismaClient();
                const path = process.env.MILA_BACKUP_PATH;
                if (!/^\/data\/backups\/mila-\d{8}T\d{6}Z\.db$/.test(path || "")) {
                  console.error("Refusing unexpected backup path");
                  process.exit(2);
                }
                db.$executeRawUnsafe("VACUUM INTO ?", path)
                  .then(() => db.$disconnect())
                  .catch(async error => { console.error(error); await db.$disconnect(); process.exit(1); });
              '
              docker exec -e DATABASE_URL="file:$backup_path" mila node -e '
                const { PrismaClient } = require("@prisma/client");
                const db = new PrismaClient();
                db.$queryRawUnsafe("PRAGMA quick_check")
                  .then(async rows => {
                    const ok = Array.isArray(rows) && rows.some(row => row.quick_check === "ok");
                    console.log("SQLite backup quick_check:", JSON.stringify(rows));
                    await db.$disconnect();
                    if (!ok) process.exit(1);
                  })
                  .catch(async error => { console.error(error); await db.$disconnect(); process.exit(1); });
              '
              echo "SQLite pre-deploy backup verified: $backup_path"
              # Keep storage bounded only after the new snapshot has passed its
              # integrity check. The retention script accepts files—not links—
              # with Mila's exact UTC backup shape, always preserves this deploy's
              # snapshot, and unlinks validated paths one at a time.
              docker exec -e MILA_BACKUP_PATH="$backup_path" mila node -e '
                const fs = require("node:fs");
                const path = require("node:path");
                const directory = "/data/backups";
                const currentPath = process.env.MILA_BACKUP_PATH || "";
                const absolutePattern = /^\/data\/backups\/mila-\d{8}T\d{6}Z\.db$/;
                const filenamePattern = /^mila-\d{8}T\d{6}Z\.db$/;
                const retain = 14;

                if (!absolutePattern.test(currentPath) || path.dirname(currentPath) !== directory) {
                  console.error("Refusing retention for unexpected backup path");
                  process.exit(2);
                }
                const directoryStat = fs.lstatSync(directory);
                if (!directoryStat.isDirectory()) {
                  console.error("Refusing retention outside the real backup directory");
                  process.exit(2);
                }
                const current = path.basename(currentPath);
                const currentStat = fs.lstatSync(currentPath);
                if (!currentStat.isFile() || currentStat.size <= 0) {
                  console.error("Refusing retention without the verified backup file");
                  process.exit(2);
                }

                const entries = fs.readdirSync(directory, { withFileTypes: true });
                const unexpectedEntry = entries.find(entry => filenamePattern.test(entry.name) && !entry.isFile());
                if (unexpectedEntry) {
                  console.error("Refusing non-file backup entry:", unexpectedEntry.name);
                  process.exit(2);
                }
                const backups = entries
                  .filter(entry => entry.isFile() && filenamePattern.test(entry.name))
                  .map(entry => entry.name)
                  .sort()
                  .reverse();
                if (!backups.includes(current)) {
                  console.error("Verified backup disappeared before retention");
                  process.exit(2);
                }

                const keep = new Set([current]);
                for (const filename of backups) {
                  if (keep.size >= retain) break;
                  keep.add(filename);
                }
                const prune = backups.filter(filename => !keep.has(filename));
                for (const filename of prune) {
                  if (!filenamePattern.test(filename)) {
                    console.error("Refusing unexpected retention filename");
                    process.exit(2);
                  }
                  const candidate = path.join(directory, filename);
                  if (path.dirname(candidate) !== directory || !fs.lstatSync(candidate).isFile()) {
                    console.error("Refusing unexpected retention target:", candidate);
                    process.exit(2);
                  }
                  fs.unlinkSync(candidate);
                  console.log("Pruned old Mila backup:", candidate);
                }
                console.log(`SQLite backup retention: kept ${keep.size}, pruned ${prune.length}, limit ${retain}`);
              '
            else
              echo "No running Mila container; skipping first-deploy SQLite snapshot"
            fi
            docker compose -f docker-compose.prod.yml build
            # Public app first; speech services after it is serving.
            docker compose -f docker-compose.prod.yml up -d --no-deps mila
            for attempt in $(seq 1 30); do
              if docker exec mila node -e "require('http').get('http://localhost:3000/',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"; then
                break
              fi
              if [ "$attempt" -eq 30 ]; then
                docker logs --tail 100 mila
                exit 1
              fi
              sleep 2
            done
            docker exec mila node -e "
              if (process.env.NODE_ENV !== 'production' || process.env.VOICE_REALTIME_PAID_ONLY !== 'true') {
                console.error('Production Realtime paid-only invariant is not active');
                process.exit(1);
              }
              console.log('Realtime paid-only invariant active');
            "
            # MiaChat is a second product surface served by the same application
            # container. Install its Caddy vhost only after the new image is
            # healthy; the script validates, reloads, and rolls back on failure.
            bash scripts/configure-miachat-proxy.sh
            for attempt in $(seq 1 30); do
              if curl -fsS --max-time 10 https://miachat.purangpt.com/login >/dev/null; then
                echo "MiaChat HTTPS route is live"
                break
              fi
              if [ "$attempt" -eq 30 ]; then
                echo "MiaChat HTTPS route did not become ready"
                exit 1
              fi
              sleep 2
            done
            docker compose -f docker-compose.prod.yml up -d --no-deps mila-pron mila-asr mila-tts
            wait_for_health() {
              container="$1"
              port="$2"
              for attempt in $(seq 1 30); do
                if docker exec "$container" python -c "import urllib.request; urllib.request.urlopen('http://localhost:$port/health', timeout=3)"; then
                  return 0
                fi
                sleep 2
              done
              docker logs --tail 100 "$container"
              return 1
            }
            pron_ready=false
            asr_ready=false
            tts_ready=false
            if wait_for_health mila-pron 8000; then pron_ready=true; fi
            if wait_for_health mila-asr 8001; then asr_ready=true; fi
            if wait_for_health mila-tts 8002; then tts_ready=true; fi
            if [ "$pron_ready" = true ] && [ "$asr_ready" = true ]; then
              docker exec mila node -e "Promise.all([fetch('http://mila-pron:8000/health'),fetch('http://mila-asr:8001/health')]).then(rs=>{console.log('local speech services',rs.map(r=>r.status));process.exit(rs.every(r=>r.ok)?0:1)}).catch(e=>{console.error(e.message);process.exit(1)})"
            else
              echo "Speech service warning: pronunciation=$pron_ready asr=$asr_ready"
            fi
            if [ "$tts_ready" = true ]; then
              docker exec mila node -e "fetch('http://mila-tts:8002/health').then(r=>{console.log('piper tts',r.status);process.exit(r.ok?0:1)}).catch(e=>{console.error(e.message);process.exit(1)})"
            else
              echo "TTS warning: Piper unavailable — browser speech fallback stays active"
            fi
            # --- Local brains RESTORED 2026-07-19: bring up the resident Ollama
            # chat + voice models (bounded in compose), pull, and list. The private
            # Darshan voice REQUIRES the local voice model (privacyMode=local
            # refuses the cloud); cloud stays the fallback for non-private chat.
            # Best-effort: a slow/failed pull warns, it does not fail the deploy.
            docker compose -f docker-compose.prod.yml up -d --no-deps mila-llm mila-voice-llm
            wait_for_ollama() {
              for attempt in $(seq 1 30); do
                if docker exec -e OLLAMA_HOST=127.0.0.1:11434 "$1" ollama list >/dev/null 2>&1; then return 0; fi
                sleep 2
              done
              docker logs --tail 50 "$1" || true; return 1
            }
            local_llm_model="${LOCAL_LLM_MODEL:-gpt-oss:20b}"
            voice_llm_model="${LOCAL_VOICE_LLM_MODEL:-qwen3:4b-instruct-2507-q4_K_M}"
            chat_ready=false; voice_ready=false
            if wait_for_ollama mila-llm; then
              if docker exec -e OLLAMA_HOST=127.0.0.1:11434 mila-llm ollama pull "$local_llm_model"; then chat_ready=true; else echo "::warning::chat model pull failed — local /chat degraded, cloud fallback active"; fi
            else echo "::warning::mila-llm did not become healthy"; fi
            if wait_for_ollama mila-voice-llm; then
              if docker exec -e OLLAMA_HOST=127.0.0.1:11434 mila-voice-llm ollama pull "$voice_llm_model"; then voice_ready=true; else echo "::warning::voice model pull failed — private Darshan voice still degraded"; fi
            else echo "::warning::mila-voice-llm did not become healthy"; fi
            docker exec -e OLLAMA_HOST=127.0.0.1:11434 mila-llm ollama list 2>/dev/null || true
            docker exec -e OLLAMA_HOST=127.0.0.1:11434 mila-voice-llm ollama list 2>/dev/null || true
            echo "local brains restored: chat=$chat_ready voice=$voice_ready"
            # --- Cloud brain check: the chat model now lives with a provider.
            # A dead key means dead chat, so this is a HARD gate (the app 200
            # check above already proved the site itself serves).
            docker exec mila node -e "
              const viaOpenRouter = () => fetch('https://openrouter.ai/api/v1/chat/completions',{method:'POST',headers:{'content-type':'application/json',authorization:'Bearer '+process.env.OPENROUTER_API_KEY},body:JSON.stringify({model:process.env.OPENROUTER_CHAT_MODEL||'openai/gpt-4o-mini',messages:[{role:'user',content:'Say OK'}],max_tokens:3})});
              const viaOpenAI = () => fetch('https://api.openai.com/v1/chat/completions',{method:'POST',headers:{'content-type':'application/json',authorization:'Bearer '+process.env.OPENAI_API_KEY},body:JSON.stringify({model:'gpt-4o-mini',messages:[{role:'user',content:'Say OK'}],max_tokens:3})});
              const attempt = process.env.OPENROUTER_API_KEY ? viaOpenRouter() : viaOpenAI();
              attempt.then(async r=>{
                if (r.ok) { const d=await r.json(); console.log('cloud brain OK:', JSON.stringify(d.choices&&d.choices[0].message.content)); process.exit(0); }
                if (process.env.OPENROUTER_API_KEY && process.env.OPENAI_API_KEY) {
                  const r2 = await viaOpenAI();
                  if (r2.ok) { console.log('cloud brain OK via OpenAI fallback'); process.exit(0); }
                  console.error('both cloud providers failed:', r.status, r2.status); process.exit(1);
                }
                console.error('cloud brain failed:', r.status); process.exit(1);
              }).catch(e=>{console.error(e.message);process.exit(1)});
            "
            docker exec mila node -e "require('http').get('http://localhost:3000/',r=>{console.log('status',r.statusCode);process.exit(r.statusCode===200?0:1)}).on('error',e=>{console.error(e.message);process.exit(1)})"
            echo "✅ Mila deployed — local brains restored (chat=$chat_ready voice=$voice_ready) + cloud fallback; models bounded for PuranGPT co-tenancy"
