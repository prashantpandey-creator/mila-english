name: Deploy Mila to Hetzner
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 204.168.176.229
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /root/mila 2>/dev/null || git clone https://github.com/prashantpandey-creator/mila-english.git /root/mila
            cd /root/mila && git pull
            echo "JWT_SECRET=${{ secrets.MILA_JWT_SECRET }}" > .env
            docker compose down --remove-orphans 2>/dev/null || true
            docker compose build && docker compose up -d
            sleep 3
            docker exec mila node -e "require('http').get('http://localhost:3000/',r=>{console.log('status',r.statusCode);process.exit(r.statusCode===200?0:1)}).on('error',e=>{console.error(e.message);process.exit(1)})"
            echo "✅ Mila deployed — routed via Traefik at mila.purangpt.com"
