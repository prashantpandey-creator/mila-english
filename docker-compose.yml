services:
  engfluent:
    build: .
    container_name: engfluent
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - DATABASE_URL=file:/data/engfluent.db
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-in-production}
      - NEXT_PUBLIC_API_URL=http://localhost:3000
    volumes:
      - engfluent_data:/data
    networks:
      - engfluent
      - coolify

volumes:
  engfluent_data:
    driver: local

networks:
  engfluent:
    driver: bridge
  coolify:
    external: true
