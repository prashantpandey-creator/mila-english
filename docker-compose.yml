services:
  mila:
    build: .
    container_name: mila
    restart: unless-stopped
    environment:
      - DATABASE_URL=file:/data/mila.db
      - JWT_SECRET=${JWT_SECRET:-mila-dev-secret-change-in-production}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_REALTIME_MODEL=${OPENAI_REALTIME_MODEL:-gpt-realtime-2.1}
      - OPENAI_REALTIME_VOICE=${OPENAI_REALTIME_VOICE:-shimmer}
      - OPENAI_ASSESSMENT_MODEL=${OPENAI_ASSESSMENT_MODEL:-gpt-5.6-luna}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_ASSESSMENT_MODEL=${OPENROUTER_ASSESSMENT_MODEL:-}
      - OPENAI_TRANSLATION_MODEL=${OPENAI_TRANSLATION_MODEL:-gpt-5.6}
      - LOCAL_LLM_URL=${LOCAL_LLM_URL:-http://mila-llm:11434}
      - LOCAL_LLM_MODEL=${LOCAL_LLM_MODEL:-gpt-oss:20b}
      - LOCAL_LLM_REASONING_EFFORT=${LOCAL_LLM_REASONING_EFFORT:-low}
      - LOCAL_VOICE_LLM_URL=${LOCAL_VOICE_LLM_URL:-http://mila-voice-llm:11434}
      - LOCAL_VOICE_LLM_MODEL=${LOCAL_VOICE_LLM_MODEL:-qwen3:4b-instruct-2507-q4_K_M}
      - LOCAL_VOICE_LLM_REASONING_EFFORT=${LOCAL_VOICE_LLM_REASONING_EFFORT:-low}
      - ALLOW_EXTERNAL_CHAT_FALLBACK=${ALLOW_EXTERNAL_CHAT_FALLBACK:-false}
      - OPENROUTER_CHAT_MODEL=${OPENROUTER_CHAT_MODEL:-}
      - ASR_URL=${ASR_URL:-http://mila-asr:8001}
      - TELEGRAM_TRANSLATOR_BOT_TOKEN=${TELEGRAM_TRANSLATOR_BOT_TOKEN:-}
      - TELEGRAM_WEBHOOK_SECRET=${TELEGRAM_WEBHOOK_SECRET:-}
    volumes:
      - mila_data:/data
    networks:
      - mila
      - coolify
    depends_on:
      mila-llm:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.docker.network=coolify
      - traefik.http.routers.mila-http.rule=Host(`mila.purangpt.com`)
      - traefik.http.routers.mila-http.entrypoints=http
      - traefik.http.routers.mila-http.middlewares=mila-redirect
      - traefik.http.middlewares.mila-redirect.redirectscheme.scheme=https
      - traefik.http.routers.mila.rule=Host(`mila.purangpt.com`)
      - traefik.http.routers.mila.entrypoints=https
      - traefik.http.routers.mila.tls=true
      - traefik.http.routers.mila.tls.certresolver=letsencrypt
      - traefik.http.services.mila.loadbalancer.server.port=3000

  mila-asr:
    build: ./asr-service
    container_name: mila-asr
    restart: unless-stopped
    environment:
      - ASR_MODEL_PATH=/models/small
      - ASR_COMPUTE_TYPE=int8
      - ASR_CPU_THREADS=${ASR_CPU_THREADS:-4}
    networks:
      - mila

  mila-llm:
    image: ollama/ollama:0.32.0
    container_name: mila-llm
    restart: unless-stopped
    cpu_shares: 256
    mem_limit: 16g
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_CONTEXT_LENGTH=${OLLAMA_CONTEXT_LENGTH:-8192}
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:--1}
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_NUM_PARALLEL=1
    volumes:
      - mila_llm:/root/.ollama
    expose:
      - "11434"
    networks:
      - mila
    healthcheck:
      test: ["CMD-SHELL", "OLLAMA_HOST=127.0.0.1:11434 ollama list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  mila-voice-llm:
    image: ollama/ollama:0.32.0
    container_name: mila-voice-llm
    restart: unless-stopped
    cpu_shares: 1024
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_CONTEXT_LENGTH=4096
      - OLLAMA_KEEP_ALIVE=-1
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_NUM_PARALLEL=1
    volumes:
      - mila_voice_llm:/root/.ollama
    expose:
      - "11434"
    networks:
      - mila
    healthcheck:
      test: ["CMD-SHELL", "OLLAMA_HOST=127.0.0.1:11434 ollama list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

volumes:
  mila_data:
    driver: local
  mila_llm:
    driver: local
  mila_voice_llm:
    driver: local

networks:
  mila:
    driver: bridge
  coolify:
    external: true
