services:
  mila:
    build: .
    container_name: mila
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - DATABASE_URL=file:/data/mila.db
      - JWT_SECRET=${JWT_SECRET:-mila-dev-secret-change-in-production}
    volumes:
      - mila_data:/data
    networks:
      - mila
      - coolify

volumes:
  mila_data:
    driver: local

networks:
  mila:
    driver: bridge
  coolify:
    external: true
