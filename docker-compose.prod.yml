# Mila — Mumbai (SSDNodes) origin. Mirrors the purangpt frontend wiring:
# both containers join the existing root_default network so Caddy (also on
# root_default) resolves mila:3000 and mila resolves mila-pron:8000. No Traefik,
# no published host ports — only Caddy is web-facing, same as the rest of prod.
services:
  mila:
    build: .
    container_name: mila
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=file:/data/mila.db
      - APP_URL=${APP_URL:-https://mila.purangpt.com}
      # Product invariant: external Realtime voice is never a free production
      # fallback. The application enforces this too; compose makes drift visible.
      - VOICE_REALTIME_PAID_ONLY=true
      - PRON_URL=http://mila-pron:8000
      - ASR_URL=http://mila-asr:8001
      - TTS_URL=http://mila-tts:8002
      # One compact resident model serves voice plus local fallback. The old
      # 20B chat runtime could add ~14–16 GiB to this shared host on one request.
      - LOCAL_LLM_URL=http://mila-voice-llm:11434
      - LOCAL_LLM_MODEL=${LOCAL_VOICE_LLM_MODEL:-qwen3:4b-instruct-2507-q4_K_M}
      - LOCAL_LLM_REASONING_EFFORT=${LOCAL_LLM_REASONING_EFFORT:-low}
      - LOCAL_VOICE_LLM_URL=${LOCAL_VOICE_LLM_URL:-http://mila-voice-llm:11434}
      - LOCAL_VOICE_LLM_MODEL=${LOCAL_VOICE_LLM_MODEL:-qwen3:4b-instruct-2507-q4_K_M}
      - LOCAL_VOICE_LLM_REASONING_EFFORT=${LOCAL_VOICE_LLM_REASONING_EFFORT:-low}
      - ALLOW_EXTERNAL_CHAT_FALLBACK=${ALLOW_EXTERNAL_CHAT_FALLBACK:-true}
      - OPENROUTER_CHAT_MODEL=${OPENROUTER_CHAT_MODEL:-}
      - NODE_ENV=production
    volumes:
      - mila_data:/data
    mem_limit: 1g
    cpus: 2.0
    networks:
      - root_default
      - mila_private

  mila-pron:
    build: ./pron-service
    container_name: mila-pron
    restart: unless-stopped
    mem_limit: 1g
    cpus: 2.0
    networks:
      - root_default

  mila-asr:
    build: ./asr-service
    container_name: mila-asr
    restart: unless-stopped
    environment:
      - ASR_MODEL_PATH=/models/small
      - ASR_COMPUTE_TYPE=int8
      - ASR_CPU_THREADS=${ASR_CPU_THREADS:-4}
    mem_limit: 2g
    cpus: 3.0
    networks:
      - root_default
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3

  mila-tts:
    build: ./tts-service
    container_name: mila-tts
    restart: unless-stopped
    # Piper is a small CPU neural voice (warm US female, en_US-amy-medium).
    # Hard-bounded so it can never compete with the resident Ollama models for
    # RAM or cores — synthesis is ~150-250ms and only bursts on spoken lines.
    mem_limit: 1g
    cpus: 2.0
    networks:
      - root_default
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3

  mila-voice-llm:
    image: ollama/ollama:0.32.0
    container_name: mila-voice-llm
    restart: unless-stopped
    cpu_shares: 1024
    # qwen3:4b q4_K_M is ~2.5GiB loaded; 6g leaves KV-cache + runner headroom.
    mem_limit: 6g
    memswap_limit: 6g
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_CONTEXT_LENGTH=4096
      - OLLAMA_KEEP_ALIVE=-1
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_NUM_PARALLEL=1
    volumes:
      - mila_voice_llm:/root/.ollama
    expose:
      - "11434"
    networks:
      - mila_private
    healthcheck:
      test: ["CMD-SHELL", "OLLAMA_HOST=127.0.0.1:11434 ollama list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

volumes:
  mila_data:
    driver: local
  # Retained for rollback only. The former 20B container is stopped by deploy;
  # keeping its volume makes the retirement recoverable without reserving RAM.
  mila_llm:
    driver: local
  mila_voice_llm:
    driver: local

networks:
  root_default:
    external: true
  mila_private:
    driver: bridge
