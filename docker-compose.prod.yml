# Mila — Mumbai (SSDNodes) origin. Mirrors the purangpt frontend wiring:
# both containers join the existing root_default network so Caddy (also on
# root_default) resolves mila:3000 and mila resolves mila-pron:8000. No Traefik,
# no published host ports — only Caddy is web-facing, same as the rest of prod.
services:
  mila:
    build: .
    container_name: mila
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=file:/data/mila.db
      - PRON_URL=http://mila-pron:8000
      - ASR_URL=http://mila-asr:8001
      - TTS_URL=http://mila-tts:8002
      # The resident Ollama pair was retired from this shared production host.
      # Explicitly disable its health probes even if the server .env is stale.
      - LOCAL_LLM_ENABLED=false
      - ALLOW_EXTERNAL_CHAT_FALLBACK=${ALLOW_EXTERNAL_CHAT_FALLBACK:-true}
      - OPENROUTER_CHAT_MODEL=${OPENROUTER_CHAT_MODEL:-}
      - NODE_ENV=production
    volumes:
      - mila_data:/data
    networks:
      - root_default
      - mila_private

  mila-pron:
    build: ./pron-service
    container_name: mila-pron
    restart: unless-stopped
    networks:
      - root_default

  mila-asr:
    build: ./asr-service
    container_name: mila-asr
    restart: unless-stopped
    environment:
      - ASR_MODEL_PATH=/models/small
      - ASR_COMPUTE_TYPE=int8
      - ASR_CPU_THREADS=${ASR_CPU_THREADS:-4}
    networks:
      - root_default
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3

  mila-tts:
    build: ./tts-service
    container_name: mila-tts
    restart: unless-stopped
    # Piper is a small CPU neural voice (warm US female, en_US-amy-medium).
    # Hard-bounded so synthesis cannot crowd the web app or co-tenant services.
    mem_limit: 1g
    cpus: 2.0
    networks:
      - root_default
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3



volumes:
  mila_data:
    driver: local

networks:
  root_default:
    external: true
  mila_private:
    driver: bridge
