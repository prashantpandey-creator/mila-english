# Mila — Mumbai (SSDNodes) origin. Mirrors the purangpt frontend wiring:
# both containers join the existing root_default network so Caddy (also on
# root_default) resolves mila:3000 and mila resolves mila-pron:8000. No Traefik,
# no published host ports — only Caddy is web-facing, same as the rest of prod.
services:
  mila:
    build: .
    container_name: mila
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=file:/data/mila.db
      - PRON_URL=http://mila-pron:8000
      - ASR_URL=http://mila-asr:8001
      - TTS_URL=http://mila-tts:8002
      - LOCAL_LLM_URL=${LOCAL_LLM_URL:-http://mila-llm:11434}
      - LOCAL_LLM_MODEL=${LOCAL_LLM_MODEL:-gpt-oss:20b}
      - LOCAL_LLM_REASONING_EFFORT=${LOCAL_LLM_REASONING_EFFORT:-low}
      - LOCAL_VOICE_LLM_URL=${LOCAL_VOICE_LLM_URL:-http://mila-voice-llm:11434}
      - LOCAL_VOICE_LLM_MODEL=${LOCAL_VOICE_LLM_MODEL:-qwen3:4b-instruct-2507-q4_K_M}
      - LOCAL_VOICE_LLM_REASONING_EFFORT=${LOCAL_VOICE_LLM_REASONING_EFFORT:-low}
      - ALLOW_EXTERNAL_CHAT_FALLBACK=${ALLOW_EXTERNAL_CHAT_FALLBACK:-false}
      - OPENROUTER_CHAT_MODEL=${OPENROUTER_CHAT_MODEL:-}
      - NODE_ENV=production
    volumes:
      - mila_data:/data
    networks:
      - root_default
      - mila_private
    depends_on:
      mila-llm:
        condition: service_healthy

  mila-pron:
    build: ./pron-service
    container_name: mila-pron
    restart: unless-stopped
    networks:
      - root_default

  mila-asr:
    build: ./asr-service
    container_name: mila-asr
    restart: unless-stopped
    environment:
      - ASR_MODEL_PATH=/models/small
      - ASR_COMPUTE_TYPE=int8
      - ASR_CPU_THREADS=${ASR_CPU_THREADS:-4}
    networks:
      - root_default
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3

  mila-tts:
    build: ./tts-service
    container_name: mila-tts
    restart: unless-stopped
    # Piper is a small CPU neural voice (warm US female, en_US-amy-medium).
    # Hard-bounded so it can never compete with the resident Ollama models for
    # RAM or cores — synthesis is ~150-250ms and only bursts on spoken lines.
    mem_limit: 1g
    cpus: 2.0
    networks:
      - root_default
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3

  mila-llm:
    image: ollama/ollama:0.32.0
    container_name: mila-llm
    restart: unless-stopped
    # GPT-OSS is capped at half of the 8-vCPU host so model warm-up and Chat
    # cannot starve the web origin or Darshan. The memory ceiling protects ASR.
    # 2026-07-18: the 20b needs ~14GiB anon (Ollama 0.32 loads with mmap off).
    # An out-of-band `docker update` to 6GiB made every load a cgroup OOM kill
    # and turned six deploys red. These limits are the only sanctioned ones —
    # if the box must be strangled, change them HERE in git; the deploy
    # workflow warns when live containers drift from this file.
    cpus: 4.0
    cpu_shares: 256
    mem_limit: 16g
    memswap_limit: 16g
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_CONTEXT_LENGTH=${OLLAMA_CONTEXT_LENGTH:-4096}
      # The deployment warms Ollama only after the speech services have booted.
      # Keeping Chat resident removes a model load from the first turn after idle.
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:--1}
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_NUM_PARALLEL=1
    volumes:
      - mila_llm:/root/.ollama
    expose:
      - "11434"
    networks:
      - mila_private
    healthcheck:
      test: ["CMD-SHELL", "OLLAMA_HOST=127.0.0.1:11434 ollama list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  mila-voice-llm:
    image: ollama/ollama:0.32.0
    container_name: mila-voice-llm
    restart: unless-stopped
    cpu_shares: 1024
    # qwen3:4b q4_K_M is ~2.5GiB loaded; 6g leaves KV-cache and runner headroom
    # while guaranteeing the voice runtime can never squeeze the shared box.
    # (It ran uncapped until 2026-07-18; an unrecorded 3GiB `docker update`
    # then made loads a coin flip. Explicit is the only honest setting.)
    mem_limit: 6g
    memswap_limit: 6g
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_CONTEXT_LENGTH=4096
      - OLLAMA_KEEP_ALIVE=-1
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_NUM_PARALLEL=1
    volumes:
      - mila_voice_llm:/root/.ollama
    expose:
      - "11434"
    networks:
      - mila_private
    healthcheck:
      test: ["CMD-SHELL", "OLLAMA_HOST=127.0.0.1:11434 ollama list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

volumes:
  mila_data:
    driver: local
  mila_llm:
    driver: local
  mila_voice_llm:
    driver: local

networks:
  root_default:
    external: true
  mila_private:
    driver: bridge
